# Meteora DLMM 简化智能 LP 策略配置文件
# 基于 IMPROVED_STRATEGY_DESIGN.md 理论设计

# ========================================
# 基础配置
# ========================================

# LP 连接器名称（Meteora DLMM）
connector: meteora/clmm

# Swap 连接器名称（Jupiter Router）
swap_connector: jupiter/router

# 交易对（示例：SOL-USDC, BONK-USDC 等）
trading_pair: SOL-USDC

# 池子地址（可选，留空自动获取）
pool_address: ""


# ========================================
# 区间配置
# ========================================

# 价格区间宽度（百分比）
# 推荐值：
# - 低波动币：10-12%
# - 中等波动：12-18%
# - 高波动（meme币）：18-25%
price_range_pct: 15.0


# ========================================
# 资金配置
# ========================================

# Base Token 数量（如 SOL）
# 设置为 0.0 表示使用钱包余额的百分比
base_token_amount: 0.0

# Quote Token 数量（如 USDC）
# 设置为 0.0 表示使用钱包余额的百分比
quote_token_amount: 0.0

# 钱包余额使用百分比
# 仅在 token_amount = 0 时生效
# 推荐：80% (保留 20% 作为 gas 费和缓冲)
wallet_allocation_pct: 80.0


# ========================================
# Jupiter 自动换币配置
# ========================================

# 启用 Jupiter 自动换币
# true: 初始化时自动准备双边代币
# false: 需要手动准备代币
enable_auto_swap: true

# 自动换币滑点容忍度（百分比）
# 推荐：1.0-2.0%
auto_swap_slippage_pct: 2.0

# 最小代币余额比例
# 如果某代币占比 < 此值，触发自动换币
# 推荐：0.4 (40%)，即双边至少各占 40%
min_token_balance_ratio: 0.4


# ========================================
# 再平衡配置（保守策略）
# ========================================

# 再平衡触发阈值（百分比）
# 95.0 = 价格距离区间边界仅剩 5% 空间时才触发
# 这是非常保守的设置，避免频繁再平衡
# 推荐：90-95%
rebalance_threshold_pct: 95.0

# 再平衡冷却期（秒）
# 避免频繁操作，降低 gas 成本
# 86400 = 24 小时
# 43200 = 12 小时
# 推荐：24-72 小时
rebalance_cooldown_seconds: 86400

# 最小再平衡盈利要求（百分比）
# 仅在预期净收益 > 此值时才允许再平衡
# 推荐：8-15%（确保再平衡有利可图）
min_profit_for_rebalance: 10.0


# ========================================
# 趋势检测配置
# ========================================

# 启用趋势检测
# true: 根据价格历史检测市场趋势（震荡/上涨/下跌）
# false: 不检测趋势，按固定策略运行
enable_trend_detection: true

# 趋势检测周期（小时）
# 用于分析价格历史判断趋势
# 推荐：24 小时（1 天）
trend_detection_period_hours: 24

# 趋势强度阈值（0-1）
# 只有趋势强度 > 此值才确认为明确趋势
# 推荐：0.7（70% 确定性）
trend_strength_threshold: 0.7


# ========================================
# 上涨趋势策略
# ========================================

# 上涨趋势启用单边 USDC 流动性
# true: 检测到上涨后，切换为只提供 USDC（避免卖出 SOL）
# false: 始终保持双边流动性
enable_single_side_on_uptrend: true

# 超出区间后等待观察期（小时）
# 价格超出区间后，先等待观察是否回调
# 如果短期回调，无常损失会自动恢复
# 推荐：6-12 小时
wait_period_before_rebalance_hours: 6

# 最小累积手续费百分比（相对仓位价值）
# 只有累积手续费 > 此值才考虑再平衡
# 推荐：5% (表示手续费已累积到足够覆盖成本)
min_accumulated_fees_pct: 5.0


# ========================================
# 风险控制
# ========================================

# 止损百分比（相对初始投入）
# 触发后关闭所有仓位并暂停
# 推荐：10-20%
stop_loss_pct: 15.0


# ========================================
# 监控配置
# ========================================

# 检查间隔（秒）
# 推荐：30-60 秒
check_interval_seconds: 30


# ========================================
# 使用示例和参数说明
# ========================================

# 示例 1: SOL-USDC 保守策略（震荡市）
# connector: meteora/clmm
# trading_pair: SOL-USDC
# price_range_pct: 15.0  # ±15% 区间
# rebalance_threshold_pct: 95.0  # 极保守
# rebalance_cooldown_seconds: 86400  # 24h 冷却
# min_profit_for_rebalance: 10.0  # 10% 盈利才再平衡
# enable_trend_detection: true
# enable_single_side_on_uptrend: true

# 示例 2: BONK-USDC 高波动策略（meme 币）
# connector: meteora/clmm
# trading_pair: BONK-USDC
# price_range_pct: 25.0  # ±25% 宽区间
# rebalance_threshold_pct: 92.0  # 稍宽松
# rebalance_cooldown_seconds: 43200  # 12h 冷却
# min_profit_for_rebalance: 12.0  # 更高盈利要求
# wait_period_before_rebalance_hours: 8  # 更长观察期

# 示例 3: ETH-USDC 中等策略
# connector: meteora/clmm
# trading_pair: ETH-USDC
# price_range_pct: 12.0  # ±12% 区间
# rebalance_threshold_pct: 95.0
# rebalance_cooldown_seconds: 86400
# min_profit_for_rebalance: 8.0
# enable_single_side_on_uptrend: false  # ETH 可能更适合双边


# ========================================
# 关键参数调优指南
# ========================================

# 1. price_range_pct (区间宽度)
#    - 太窄：频繁超出区间，频繁再平衡
#    - 太宽：价格波动不穿越 bins，手续费少
#    - 建议：根据资产 30 天波动率的 1.5-2 倍

# 2. rebalance_threshold_pct (再平衡阈值)
#    - 95%：极保守，几乎不再平衡
#    - 90%：保守，偶尔再平衡
#    - 80%：激进，频繁再平衡（不推荐）
#    - 建议：从 95% 开始，观察效果后调整

# 3. rebalance_cooldown_seconds (冷却期)
#    - 24h：适合低波动资产（SOL, ETH）
#    - 12h：适合中等波动资产
#    - 6h：适合高波动 meme 币（谨慎使用）

# 4. min_profit_for_rebalance (最小盈利)
#    - 10%：保守，确保每次再平衡都有利可图
#    - 8%：中等
#    - 5%：激进，可能频繁再平衡

# 5. wait_period_before_rebalance_hours (观察期)
#    - 12h：非常保守，给足够时间观察回调
#    - 6h：平衡
#    - 3h：激进，快速响应趋势


# ========================================
# 策略理论依据（IMPROVED_STRATEGY_DESIGN.md）
# ========================================

# 核心思想 1: 被动优于主动
# - 频繁再平衡 = 实现无常损失 + 放弃价格回调恢复机会
# - 被动持有 = 让无常损失在震荡中自动恢复

# 核心思想 2: 趋势适应性
# - 震荡市：双边流动性，被动赚手续费
# - 上涨市：单边 USDC，避免卖出 SOL
# - 下跌市：单边 USDC 或止损（避免接盘）

# 核心思想 3: 多因子决策
# 不依赖单一阈值，综合考虑：
# - 冷却期（避免频繁操作）
# - 超出时长（给回调时间）
# - 趋势强度（确认真趋势 vs 假突破）
# - 累积手续费（收益激励）
# - 回调概率（震荡市高，趋势市低）
# - 预期净收益（扣除成本和无常损失）
