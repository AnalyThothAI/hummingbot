# rebalance_threshold_pct: 75.0
# rebalance_cooldown_seconds: 180  # 3分钟
# out_of_range_timeout_seconds: 60  # 60秒
# stop_loss_pct: 6.0
# check_interval_seconds: 15

# 示例 3: PEPE 中频配置（测试）
