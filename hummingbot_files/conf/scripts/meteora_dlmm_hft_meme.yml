# stop_loss_pct: 8.0
# check_interval_seconds: 20


# ========================================
# 参数调优指南
# ========================================

# 1. 如何选择区间宽度 (price_range_pct)？
#    步骤：
#    a) 观察 meme 币 15 分钟价格波动
#    b) 计算波动幅度（max-min）/ mean
#    c) 区间宽度 = 波动幅度 × 1.2
#    例：15分钟波动 6% → 区间设 7-8%

# 2. 如何选择冷却期 (rebalance_cooldown_seconds)？
#    经验公式：
#    冷却期 = 平均单边移动时间 × 2
#    例：价格通常 90秒完成一次上下波动
#        → 冷却期设 180秒

# 3. 如何选择止损线 (stop_loss_pct)？
#    经验法则：
#    - 观察历史最大回撤
#    - 止损线 = 平均回撤 × 1.5
#    - 但不超过 10%（meme 币风险）
#    例：平均回撤 3% → 止损设 5%

# 4. 如何调整 60秒规则？
#    测试方法：
#    a) 启动策略，观察价格超出区间后多久回调
#    b) 统计 10 次超出事件的回调时间
#    c) 取中位数 × 1.5 作为超时时间
#    例：中位数 40秒 → 设置 60秒

# 5. 如何评估策略效果？
#    关键指标：
#    - 日收益率 > 2%: 合格
#    - 日收益率 > 5%: 优秀
#    - 胜率 > 60%: 合格
#    - 盈亏比 > 2:1: 优秀
#    - 最大回撤 < 15%: 安全


# ========================================
# 风险警示（必读）
# ========================================

# 风险等级：⚠️⚠️⚠️⚠️⚠️（极高）

# 1. 本策略仅适用于：
#    ✓ meme 币高波动期（炒作期）
#    ✓ 交易量充足（日交易量 > 500k USDC）
#    ✓ 您完全理解策略原理
#    ✓ 您能承受最大 20% 亏损

# 2. 本策略不适用于：
#    ✗ 主流币（SOL, ETH, BTC）
#    ✗ 稳定币对（USDC-USDT）
#    ✗ 低流动性 meme 币
#    ✗ 衰退期 meme 币（交易量骤降）

# 3. 可能的损失场景：
#    - 单边暴跌 30%: 损失 5-10%（止损保护）
#    - 流动性枯竭: 无法退出，损失 100%
#    - Rug Pull: 损失 100%
#    - 闪崩: 损失 5-15%（取决于止损速度）

# 4. 资金管理建议：
#    - 单次投入 < 总资金 10%（测试期）
#    - 单次投入 < 总资金 20%（熟悉后）
#    - 永远不要 all in

# 5. 心理准备：
#    - 高频策略会频繁再平衡（日 10-50 次）
#    - 需要接受小额亏损（止损）
#    - 不要情绪化操作，相信自动化
#    - 设置好参数后不要随意修改


# ========================================
# 实战建议
# ========================================

# 第一步：Devnet 测试（1-3 天）
# - 使用测试网验证策略逻辑
# - 观察再平衡频率是否合理
# - 检查止损是否正常触发

# 第二步：Mainnet 小资金测试（7 天）
# - 投入 < 100 USDC
# - 记录每次再平衡和止损
# - 计算实际收益率

# 第三步：调优参数（7-14 天）
# - 根据实际数据调整参数
# - 优化冷却期、止损线
# - 提升胜率和盈亏比

# 第四步：逐步加仓（之后）
# - 如果月化收益 > 100%，胜率 > 60%
# - 可以逐步增加投入
# - 但仍需控制在总资金 20% 以内


# ========================================
# 紧急情况处理
# ========================================

# 如果遇到以下情况，立即停止策略：

# 1. 连续 3 次止损
#    → 说明市场不适合，暂停 1 天

# 2. 单日亏损 > 10%
#    → 停止策略，检查参数

# 3. 交易量骤降 > 80%
#    → 市场冷却，及时退出

# 4. 无法关闭仓位
#    → 流动性枯竭，联系 Meteora 支持

# 5. 价格闪崩 > 30%
#    → 可能 Rug Pull，立即以任何价格退出
