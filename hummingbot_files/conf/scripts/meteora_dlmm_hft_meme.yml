# Meteora DLMM 高频做市策略配置 - Meme 币专用
# 基于 MEME_HIGH_FREQUENCY_STRATEGY.md 设计

# ⚠️ 警告：高频策略风险极高！
# - 仅适用于 meme 币高波动期
# - 建议小资金测试（< 总资金 20%）
# - 务必理解所有参数含义

# ========================================
# 基础配置
# ========================================

connector: meteora/clmm
swap_connector: jupiter/router

# 交易对（选择高波动 meme 币）
# 推荐: BONK-USDC, WIF-USDC, PEPE-USDC
trading_pair: PAYAI-SOL

pool_address: '7hMhU52uguE8T5SZjFAqDgvBeeKm3g1KfivnmTPCxtd9'



# ========================================
# 高频参数（核心）
# ========================================

# 价格区间宽度（百分比）
# 高频策略使用极窄区间，紧跟价格
# 推荐值:
# - 极高波动（分钟级 10%+）: 8-10%
# - 高波动（分钟级 5-10%）: 6-8%
# - 中等波动（分钟级 3-5%）: 5-6%
price_range_pct: 8.0

# 再平衡触发阈值（百分比）
# 距离区间边界的百分比
# 高频策略使用激进阈值
# 推荐值:
# - 激进: 70-75%（距边界 25-30%）
# - 平衡: 75-80%（距边界 20-25%）
# - 保守: 80-85%（距边界 15-20%）
rebalance_threshold_pct: 75.0

# 再平衡冷却期（秒）
# 防止过于频繁操作
# 推荐值:
# - 极激进: 60秒（1分钟）
# - 激进: 120秒（2分钟）
# - 平衡: 180秒（3分钟）
# - 保守: 300秒（5分钟）
rebalance_cooldown_seconds: 180

# 最小再平衡盈利要求（百分比）
# 相对仓位价值的手续费百分比
# 高频策略放宽要求，快速决策
# 推荐值:
# - 激进: 1-2%
# - 平衡: 2-3%
# - 保守: 3-5%
min_profit_for_rebalance: 2.0


# ========================================
# 快速止损配置（关键）
# ========================================

# 启用 60秒规则
# true: 价格超出区间 > 60秒立即再平衡或止损
# false: 禁用（不推荐）
enable_60s_rule: true

# 超出区间超时时间（秒）
# 超过此时间未回调，触发再平衡/止损
# 推荐值:
# - 极快: 30秒
# - 快速: 60秒（推荐）
# - 中等: 90秒
# - 慢速: 120秒
out_of_range_timeout_seconds: 60

# 幅度止损（百分比）
# 价格下跌超过此值立即止损
# 推荐值:
# - 激进: 3-5%（快速止损，小亏出局）
# - 平衡: 5-8%（平衡风险）
# - 保守: 8-12%（给予更多空间）
# meme 币推荐: 5%（快速止损）
stop_loss_pct: 5.0

# 启用交易量监控
# true: 监控交易量骤降，提前预警
# false: 禁用
enable_volume_monitoring: true

# 交易量骤降阈值（百分比）
# 相比 1 小时前下降超过此值触发警告
# 推荐: 70-80%
volume_drop_threshold_pct: 80.0


# ========================================
# 资金配置
# ========================================

# Base Token 数量（如 BONK）
# 0.0 = 使用钱包余额百分比
base_token_amount: 0.0

# Quote Token 数量（如 USDC）
# 0.0 = 使用钱包余额百分比
quote_token_amount: 0.0

# 钱包余额使用百分比
# 推荐:
# - 测试阶段: 50%
# - 熟悉后: 70-80%
wallet_allocation_pct: 70.0


# ========================================
# Jupiter 自动换币
# ========================================

enable_auto_swap: true

# 自动换币滑点（百分比）
# meme 币流动性差，需要更高滑点
# 推荐: 2-5%
auto_swap_slippage_pct: 3.0


# ========================================
# 监控配置
# ========================================

# 检查间隔（秒）
# 高频策略需要频繁检查
# 推荐:
# - 极高频: 5秒
# - 高频: 10秒（推荐）
# - 中频: 15秒
check_interval_seconds: 10


# ========================================
# 风控配置（重要）
# ========================================

# 日最大亏损（百分比）
# 超过此值暂停策略
# 推荐: 10-20%
max_daily_loss_pct: 15.0

# 最长持仓时间（小时）
# 超过此时间且未盈利，建议退出
# 推荐:
# - meme 币黄金期: 4-6小时
# - 一般: 6-12小时
max_position_hold_hours: 6.0


# ========================================
# 使用示例
# ========================================

# 示例 1: BONK 极高频配置（炒作期）
# trading_pair: BONK-USDC
# price_range_pct: 8.0
# rebalance_threshold_pct: 70.0
# rebalance_cooldown_seconds: 120  # 2分钟
# out_of_range_timeout_seconds: 45  # 45秒
# stop_loss_pct: 5.0
# check_interval_seconds: 10

