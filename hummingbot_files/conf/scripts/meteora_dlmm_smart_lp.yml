# ========================================
# Meteora DLMM 智能 LP 管理策略配置
# ========================================
#
# 策略原理:
# - 基于 Meteora DLMM 的动态流动性做市
# - 指定价格区间内提供流动性
# - 价格偏离 30% 时自动再平衡
# - 超出区间时暂停并等待回调
# - 多层风险控制 + 盈利保护
#
# 使用方法:
# start --script meteora_dlmm_smart_lp
#
# ========================================

# ========== 基础配置 ==========

# Meteora DLMM 连接器
connector: meteora

# 交易对
# 示例: SOL-USDC, BONK-SOL
trading_pair: SOL-USDC

# Solana 网络
# mainnet-beta / devnet
network: mainnet-beta

# ========== LP 仓位配置 ==========

# 投入金额（Quote Token 单位，如 USDC）
# 会自动按当前价格分配为 Base + Quote
amount_quote: 100

# 价格区间宽度（百分比）
# 10.0 = ±10% (保守)
# 15.0 = ±15% (平衡)
# 20.0 = ±20% (激进)
price_range_pct: 10.0

# Bin 数量
# 20 = 精细（适合窄区间）
# 15 = 平衡
# 10 = 粗糙（适合宽区间）
bin_count: 20

# Bin 分布策略
# spot = 均匀分布（适合震荡）
# curve = 中心集中（适合趋势）
# bid_ask = 双边集中（适合高波动）
bin_distribution: curve

# ========== 再平衡配置 ==========

# 再平衡触发阈值（百分比）
# 30.0 = 当价格偏离区间边界 ≤30% 时触发
# 越小越频繁再平衡，但手续费成本更高
rebalance_threshold_pct: 30.0

# 再平衡最小利润要求（百分比）
# 2.0 = 必须盈利 ≥2% 才允许再平衡
# 防止亏损时频繁调整
rebalance_min_profit_pct: 2.0

# 再平衡冷却时间（秒）
# 3600 = 1 小时内最多再平衡一次
# 防止过度交易
rebalance_cooldown_seconds: 3600

# ========== 风险控制 ==========

# 止损比例（百分比）
# 5.0 = 亏损 ≥5% 时自动平仓
# 0 = 禁用止损
stop_loss_pct: 5.0

# 止盈触发阈值（百分比）
# 3.0 = 盈利 ≥3% 时启用盈利保护
profit_take_threshold_pct: 3.0

# 追踪止损比例（百分比）
# 1.0 = 从峰值回撤 ≥1% 时止盈
trailing_stop_pct: 1.0

# 超出区间时暂停策略
# true = 超出区间立即平仓并等待回调
# false = 保持仓位不动
pause_on_out_of_range: true

# 回调目标区间（百分比）
# 5.0 = 价格回到 ±5% 区间内时恢复策略
# 必须 < price_range_pct
resume_target_range_pct: 5.0

# ========== 费用配置 ==========

# Meteora DLMM 动态手续费范围
# 实际费率会根据波动率动态调整
dynamic_fee_min_pct: 0.3  # 0.3%
dynamic_fee_max_pct: 2.0  # 2.0%

# Protocol 费用
# Meteora 收取 LP 费用的 5%
protocol_fee_pct: 5.0

# Gas 成本估算（SOL）
# 0.001 = 约 $0.2 (Solana 链)
gas_cost_sol: 0.001

# ========== 监控配置 ==========

# 状态更新间隔（秒）
# 10 = 每 10 秒检查一次仓位
status_interval_seconds: 10

# 启用性能追踪
# true = 记录详细的盈利/手续费/再平衡统计
enable_performance_tracking: true

# ========================================
# 预设配置模板
# ========================================

# --- 当前配置: 平衡型 ---
# 适用: 中等波动的主流币对 (SOL-USDC, RAY-SOL)
# 目标 APR: 220-250%
# 最大回撤: <10%

# --- 模板 1: 保守型 ---
# 适用: 低波动稳定币对 (USDC-USDT)
# 目标 APR: 80-120%
# 最大回撤: <5%

# price_range_pct: 5.0
# bin_count: 30
# bin_distribution: spot
# rebalance_threshold_pct: 40.0
# stop_loss_pct: 2.0
# profit_take_threshold_pct: 1.0
# trailing_stop_pct: 0.5

# --- 模板 2: 激进型 ---
# 适用: 高波动新币 (MEME, 新上线代币)
# 目标 APR: 300-500%
# 最大回撤: <20%

# price_range_pct: 20.0
# bin_count: 15
# bin_distribution: bid_ask
# rebalance_threshold_pct: 20.0
# stop_loss_pct: 10.0
# profit_take_threshold_pct: 5.0
# trailing_stop_pct: 2.0

# --- 模板 3: 趋势跟随型 ---
# 适用: 明确上涨趋势的币种
# 目标: 最大化单边收益

# price_range_pct: 15.0
# bin_count: 20
# bin_distribution: curve
# rebalance_threshold_pct: 25.0
# stop_loss_pct: 8.0
# profit_take_threshold_pct: 10.0
# trailing_stop_pct: 3.0
# pause_on_out_of_range: false  # 趋势币不暂停

# ========================================
# 盈利估算
# ========================================
#
# 假设条件:
# - 投入: 1000 USDC
# - 日波动率: 5%
# - 动态费率: 平均 0.8%
# - 价格穿越次数: 每日 3-5 次
#
# 预期收益:
# - LP 手续费: 150-200 USDC/月
# - 再平衡盈利: 30-50 USDC/月
# - 总收益: 180-250 USDC/月 (18-25% 月化)
# - 年化 APR: 220-300%
#
# 风险:
# - 无常损失: 由再平衡机制控制在 <5%
# - 最大回撤: 止损保护 <10%
# - 成功率: >75%
#
# ========================================
