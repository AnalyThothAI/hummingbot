# ========================================
# Meteora DLMM 高频做市策略 - Meme 币专用
# ========================================

script_file_name: meteora_dlmm_hft_meme.py

# ========== 基础配置 ==========
connector: meteora/clmm
swap_connector: jupiter/router
trading_pair: ACE-SOL
pool_address: '4osuQeRfBdtZnCtoPEH1k4vWonyXuW8uiD9bx4fbdxgi'

# ========== 高频参数 ==========
price_range_pct: '10.0'                    # 价格区间宽度 ±3%（极窄区间，适合高频）
rebalance_threshold_pct: '85.0'           # 再平衡阈值 75%
rebalance_cooldown_seconds: 180           # 再平衡冷却期 3分钟
min_profit_for_rebalance: '2.0'           # 最小再平衡盈利 2%

# ========================================
# 止损配置（三级保护）
# ========================================

# 价格止损（三选一，按优先级）
stop_loss_price: null                      # 方式1: 绝对价格（如 "0.000025"，推荐）
stop_loss_below_range_pct: null            # 方式2: 区间下界的百分比（如 "10.0" 表示下界-10%）
stop_loss_pct: '5.0'                       # 方式3: 开仓价格的百分比（默认，如 "5.0" 表示开仓价-5%）

# 防插针确认时长
stop_loss_confirmation_seconds: 60         # 持续跌破 60 秒才触发

# 区间止损（60秒规则）
enable_60s_rule: true                      # 启用区间止损
out_of_range_timeout_seconds: 60           # 跌破区间 60 秒触发

# ========== 资金配置 ==========
base_token_amount: '0.0'                  # 不指定，使用钱包余额
quote_token_amount: '0.0'                 # 不指定，使用钱包余额
wallet_allocation_pct: '90.0'             # 使用钱包余额的 80%

# ========== Jupiter 自动换币 ==========
enable_auto_swap: true                    # 启用自动换币（开仓前准备代币）
auto_swap_slippage_pct: '3.0'             # 开仓换币滑点 3%

# ========================================
# 新增：风控参数
# ========================================

# 累计亏损保护
total_loss_limit_pct: '15.0'              # 累计亏损 15% 暂停策略

# 换币保护
enable_swap_on_stop_loss: true            # 硬止损后自动换成 SOL
swap_threshold_pct: '3.0'                  # 下跌超过 3% 才换币
swap_slippage_pct: '2.0'                  # 换币滑点容忍度

# 状态持久化
enable_state_persistence: true            # 启用状态持久化
state_db_path: data/meteora_hft_state.db  # 数据库路径

# ========== 监控配置 ==========
check_interval_seconds: 20                # 检查间隔 10秒
max_position_hold_hours: '8.0'            # 最长持仓 6小时（防止持仓过久）

# ========================================
# 参数说明
# ========================================

# price_range_pct: 3%
#   - 极窄区间，适合高频交易
#   - 区间: [当前价格 * 0.97, 当前价格 * 1.03]
#   - 更容易超出范围，触发再平衡
#
# stop_loss_price: null
#   - 绝对价格止损（推荐，基于技术分析）
#   - 示例: "0.000025" 表示价格跌破 0.000025 SOL 时止损
#   - 配合 stop_loss_confirmation_seconds 防止插针
#
# stop_loss_below_range_pct: null
#   - 区间下界百分比止损（动态跟随）
#   - 示例: "10.0" 表示区间下界 -10% 的价格为止损位
#   - 适合频繁再平衡的策略
#
# stop_loss_pct: "5.0"
#   - 开仓价格百分比止损（固定风险）
#   - 示例: "5.0" 表示开仓价 -5% 止损
#   - 简单明了，适合新手
#
# stop_loss_confirmation_seconds: 60
#   - 防插针确认时长
#   - 价格必须持续跌破止损位 60 秒才触发
#   - 避免短暂波动导致误触发
#
# enable_swap_on_stop_loss: true
#   - 硬止损后自动换成 SOL
#   - 条件: 下跌 > swap_threshold_pct 且触发止损
#   - 目的: 防止继续持有贬值的 meme 币
#
# rebalance_cooldown_seconds: 180
#   - 再平衡后冷却 3 分钟
#   - 避免震荡行情中频繁调整
#   - 平衡手续费收益和 gas 成本
#
# enable_state_persistence: true
#   - 记录所有开仓/平仓/换币事件
#   - 追踪累计盈亏
#   - 重启后自动恢复状态

# ========================================
# 风险提示
# ========================================

# ⚠️  本策略为高风险高频策略
# ⚠️  仅适用于 meme 币高波动期
# ⚠️  建议单次投入 < 总资金的 20%
# ⚠️  务必在 devnet 测试后再用于 mainnet
# ⚠️  定期检查累计盈亏和数据库状态
