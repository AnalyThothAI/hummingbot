# ========================================
# Meteora DLMM 高频做市策略 - Meme 币专用
# ========================================

script_file_name: meteora_dlmm_hft_meme.py

# ========== 基础配置 ==========
connector: meteora/clmm
swap_connector: jupiter/router
trading_pair: PAYAI-SOL
pool_address: '7hMhU52uguE8T5SZjFAqDgvBeeKm3g1KfivnmTPCxtd9'

# ========== 高频参数 ==========
price_range_pct: '5.0'                    # 价格区间宽度 ±3%（极窄区间，适合高频）
rebalance_threshold_pct: '85.0'           # 再平衡阈值 75%
rebalance_cooldown_seconds: 180           # 再平衡冷却期 3分钟
min_profit_for_rebalance: '2.0'           # 最小再平衡盈利 2%

# ========== 快速止损配置 ==========
enable_60s_rule: true                     # 启用 60秒规则
out_of_range_timeout_seconds: 60          # 超出区间 60秒触发
stop_loss_pct: '5.0'                      # 幅度止损 5%

# ========== 资金配置 ==========
base_token_amount: '0.0'                  # 不指定，使用钱包余额
quote_token_amount: '0.0'                 # 不指定，使用钱包余额
wallet_allocation_pct: '80.0'             # 使用钱包余额的 80%

# ========== Jupiter 自动换币 ==========
enable_auto_swap: true                    # 启用自动换币（开仓前准备代币）
auto_swap_slippage_pct: '3.0'             # 开仓换币滑点 3%

# ========================================
# 新增：风控参数
# ========================================

# 累计亏损保护
total_loss_limit_pct: '15.0'              # 累计亏损 15% 暂停策略

# 下跌止损换 SOL
enable_swap_on_downside: true             # 下跌止损时自动换成 SOL
swap_slippage_pct: '2.0'                  # 止损换币滑点 2%

# 冷却期
downside_cooldown_seconds: 300            # 下跌止损后冷却 5分钟
upside_cooldown_seconds: 60               # 上涨再平衡后冷却 1分钟

# 状态持久化
enable_state_persistence: true            # 启用状态持久化
state_db_path: data/meteora_hft_state.db  # 数据库路径

# ========== 监控配置 ==========
check_interval_seconds: 20                # 检查间隔 10秒
max_position_hold_hours: '8.0'            # 最长持仓 6小时（防止持仓过久）

# ========================================
# 参数说明
# ========================================

# price_range_pct: 3%
#   - 极窄区间，适合高频交易
#   - 区间: [当前价格 * 0.97, 当前价格 * 1.03]
#   - 更容易超出范围，触发再平衡
#
# stop_loss_pct: 5%
#   - 单次仓位亏损 5% 立即止损
#   - 配合 60秒规则，快速响应
#
# total_loss_limit_pct: 15%
#   - 累计亏损达到初始资金的 15% 时
#   - 自动暂停策略，防止继续亏损
#   - 需要手动检查后重置
#
# enable_swap_on_downside: true
#   - 价格下跌触发止损时，自动换成 SOL
#   - 避免继续持有贬值的 meme 币
#   - 上涨再平衡时保持当前资产
#
# downside_cooldown_seconds: 300
#   - 下跌止损后冷却 5 分钟
#   - 避免立即重入下跌趋势
#
# upside_cooldown_seconds: 60
#   - 上涨再平衡后冷却 1 分钟
#   - 快速重入上涨趋势
#
# enable_state_persistence: true
#   - 记录所有开仓/平仓/换币事件
#   - 追踪累计盈亏
#   - 重启后自动恢复状态

# ========================================
# 风险提示
# ========================================

# ⚠️  本策略为高风险高频策略
# ⚠️  仅适用于 meme 币高波动期
# ⚠️  建议单次投入 < 总资金的 20%
# ⚠️  务必在 devnet 测试后再用于 mainnet
# ⚠️  定期检查累计盈亏和数据库状态
